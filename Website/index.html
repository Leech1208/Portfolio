<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicolai Pfrengle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://use.typekit.net/bkc5boq.css">
</head>

<body>
    <!-- Navigation -->
    <nav id="nav">
        <p id="nametag">NICOLAI PFRENGLE</p>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Mobile Bottom Nav -->
    <nav id="bottom-nav">
        <a href="#home">
            <span>⌂</span>
            <label>Home</label>
        </a>
        <a href="#projects">
            <span>◈</span>
            <label>Projects</label>
        </a>
        <a href="#about">
            <span>◉</span>
            <label>About</label>
        </a>
        <a href="#contact">
            <span>✉</span>
            <label>Contact</label>
        </a>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="hero-container">
            <div class="hero-text">
                <h1>Hi, I'm Nicolai!</h1>
                <p>Something with Media</p>
            </div>
            <div class="hero-image">
                <img src="IMG/hero_page_picture.jpg" alt="profile picture">
            </div>
        </div>
    </section>

    <!-- Projects Section -->
    <section class="projects" id="projects">
        <h2>My Projects</h2>
        <div class="project-grid">

            <!-- Beispiel: Projekt mit Bildern und YouTube-Video -->
            <!-- YouTube-Videos: data-images mit "yt:VIDEO_ID" einmischen -->
            <div class="project-card" onclick="openModal(this)"
                data-title="CURSED CHRONICLES"
                data-desc="Semesterprojekt über zwei Semester. Rigging und Animation."
                data-images='["yt:W0RxE5RQleE","IMG/project1b.jpg"]'>
                <img class="project-image" src="IMG/titlecard_cursed_chronicles.jpg" alt="CURSED CHRONICLES">
                <div class="project-overlay">
                    <h3>CURSED CHRONICLES</h3>
                </div>
            </div>

            <div class="project-card" onclick="openModal(this)"
                data-title="LOGIN"
                data-desc="Zweitsemester Kurzfilm Projekt."
                data-images='["yt:tLVsywI0Q4g"]'>
                <img class="project-image" src="IMG/titlecard_login.jpg" alt="LOGIN">
                <div class="project-overlay">
                    <h3>LOGIN SHORT FILM</h3>
                </div>
            </div>

            <div class="project-card" onclick="openModal(this)"
                data-title="THESIS"
                data-desc="Bachelor Thesis."
                data-images='["IMG/project3a.jpg"]'>
                <img class="project-image" src="IMG/project3.jpg" alt="THESIS">
                <div class="project-overlay">
                    <h3>THESIS</h3>
                </div>
            </div>

            <div class="project-card" onclick="openModal(this)"
                data-title="Projekt 4"
                data-desc="Beschreibung Projekt 4."
                data-images='["IMG/project4a.jpg"]'>
                <img class="project-image" src="IMG/project4.jpg" alt="Projekt 4">
                <div class="project-overlay">
                    <h3>Projekt 4</h3>
                </div>
            </div>

            <div class="project-card" onclick="openModal(this)"
                data-title="Projekt 5"
                data-desc="Beschreibung Projekt 5."
                data-images='["IMG/project5a.jpg"]'>
                <img class="project-image" src="IMG/project5.jpg" alt="Projekt 5">
                <div class="project-overlay">
                    <h3>Projekt 5</h3>
                </div>
            </div>

            <div class="project-card" onclick="openModal(this)"
                data-title="Projekt 6"
                data-desc="Beschreibung Projekt 6."
                data-images='["IMG/project6a.jpg"]'>
                <img class="project-image" src="IMG/project6.jpg" alt="Projekt 6">
                <div class="project-overlay">
                    <h3>Projekt 6</h3>
                </div>
            </div>

        </div>
    </section>

    <!-- Modal -->
    <div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
        <div class="modal">
            <button class="modal-close" onclick="closeModalDirect()">✕</button>
            <div class="modal-gallery" id="modal-gallery"></div>
            <div class="modal-content">
                <h2 id="modal-title"></h2>
                <p id="modal-desc"></p>
            </div>
        </div>
    </div>

    <script>
        // Smooth scrolling
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });

        // Active state für Bottom Nav
        const sections = document.querySelectorAll('section');
        const navLinks = document.querySelectorAll('#bottom-nav a');
        window.addEventListener('scroll', () => {
            let current = '';
            sections.forEach(section => {
                if (window.scrollY >= section.offsetTop - 100) {
                    current = section.getAttribute('id');
                }
            });
            navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === '#' + current) {
                    link.classList.add('active');
                }
            });
        });

        // Modal
        let currentSlide = 0;
        let slides = [];

        function openModal(card) {
            const title = card.dataset.title;
            const desc = card.dataset.desc;
            const items = JSON.parse(card.dataset.images);

            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-desc').textContent = desc;

            const gallery = document.getElementById('modal-gallery');
            gallery.innerHTML = '';
            slides = items;
            currentSlide = 0;

            items.forEach((src, i) => {
                if (src.startsWith('yt:')) {
                    const videoId = src.slice(3);
                    const iframe = document.createElement('iframe');
                    iframe.src = `https://www.youtube.com/embed/${videoId}`;
                    iframe.setAttribute('allowfullscreen', '');
                    iframe.setAttribute('frameborder', '0');
                    iframe.style.cssText = 'width:100%;height:100%;display:none;';
                    if (i === 0) iframe.style.display = 'block';
                    gallery.appendChild(iframe);
                } else {
                    const img = document.createElement('img');
                    img.src = src;
                    if (i === 0) img.classList.add('active');
                    gallery.appendChild(img);
                }
            });

            if (items.length > 1) {
                const prev = document.createElement('button');
                prev.className = 'gallery-btn prev';
                prev.innerHTML = '‹';
                prev.onclick = () => changeSlide(-1);

                const next = document.createElement('button');
                next.className = 'gallery-btn next';
                next.innerHTML = '›';
                next.onclick = () => changeSlide(1);

                const dots = document.createElement('div');
                dots.className = 'gallery-dots';
                dots.id = 'gallery-dots';
                items.forEach((_, i) => {
                    const dot = document.createElement('span');
                    if (i === 0) dot.classList.add('active');
                    dot.onclick = () => goToSlide(i);
                    dots.appendChild(dot);
                });

                gallery.appendChild(prev);
                gallery.appendChild(next);
                gallery.appendChild(dots);
            }

            document.getElementById('modal-backdrop').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function changeSlide(dir) {
            const items = document.querySelectorAll('#modal-gallery img, #modal-gallery iframe');
            const dots = document.querySelectorAll('#gallery-dots span');
            items[currentSlide].style.display = 'none';
            items[currentSlide].classList.remove('active');
            dots[currentSlide]?.classList.remove('active');
            currentSlide = (currentSlide + dir + slides.length) % slides.length;
            items[currentSlide].style.display = 'block';
            items[currentSlide].classList.add('active');
            dots[currentSlide]?.classList.add('active');
        }

        function goToSlide(i) {
            const items = document.querySelectorAll('#modal-gallery img, #modal-gallery iframe');
            const dots = document.querySelectorAll('#gallery-dots span');
            items[currentSlide].style.display = 'none';
            items[currentSlide].classList.remove('active');
            dots[currentSlide]?.classList.remove('active');
            currentSlide = i;
            items[currentSlide].style.display = 'block';
            items[currentSlide].classList.add('active');
            dots[currentSlide]?.classList.add('active');
        }

        function closeModal(e) {
            if (e.target === document.getElementById('modal-backdrop')) closeModalDirect();
        }

        function closeModalDirect() {
            // Iframes resetten damit Video stoppt
            document.querySelectorAll('#modal-gallery iframe').forEach(iframe => {
                iframe.src = iframe.src;
            });
            document.getElementById('modal-backdrop').classList.remove('open');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModalDirect();
        });
    </script>
</body>

</html>
